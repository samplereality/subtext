<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
	<title>{{STORY_NAME}}</title>
	<!--BUILD:STYLE-->
</head>
<body>
	<div id="app">
		<header class="chat-header">
			<div class="chat-header-side chat-header-left">
				<a id="nav-link-back" class="content-container header-action" href="/" hidden>Back</a>
				<button id="nav-link-undo" class="header-action header-action--icon" type="button" title="Undo" hidden>
					<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><polyline points="9 14 4 9 9 4"></polyline><path d="M20 20v-7a4 4 0 0 0-4-4H4"></path></svg>
					<span class="visually-hidden">Undo</span>
				</button>
			</div>
			<div class="chat-header-title">
				<h1 id="ptitle"></h1>
				<div id="psub">
					<span id="psubtitle"></span>
					<span id="pauthor"></span>
				</div>
			</div>
			<div class="chat-header-side chat-header-right">
				<button id="nav-link-menu" class="content-container header-action header-action--icon" type="button" title="Menu" hidden>
					<svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
					<span class="visually-hidden">Menu</span>
				</button>
				<button id="nav-link-theme" class="header-action header-action--icon" type="button" title="Switch theme"></button>
				<button id="nav-link-restart" class="header-action header-action--icon" type="button" title="Restart story">
					<span aria-hidden="true">&#8635;</span>
					<span class="visually-hidden">Restart story</span>
				</button>
			</div>
		</header>

		<div class="chat-layout">
			<main id="chat-panel" class="chat-panel" tabindex="0" aria-label="Chat">
				<div class="chat-stream">
					<div id="phistory" class="chat-history" role="log" aria-label="Conversation"></div>
					<div id="animation-container" role="status" hidden>
						<div class="chat-passage-wrapper chat-typing-wrapper">
							<div class="chat-avatar" aria-hidden="true"></div>
							<div class="chat-bubbles">
								<div class="chat-passage chat-typing">
									<span class="dot" aria-hidden="true"></span>
									<span class="dot" aria-hidden="true"></span>
									<span class="dot" aria-hidden="true"></span>
									<span id="typing-announcement" class="visually-hidden"></span>
								</div>
							</div>
						</div>
					</div>
				</div>
			</main>

			<div id="meta-overlay" class="meta-overlay" role="status" aria-live="polite" hidden>
				<div id="meta-overlay-content" class="meta-overlay-content"></div>
			</div>

			<div id="meta-notification" class="meta-notification" role="status" aria-live="polite" hidden>
				<div class="meta-notification-card">
					<div class="meta-notification-header">
						<span id="meta-notification-label" class="meta-notification-label"></span>
						<span class="meta-notification-time">now</span>
						<button type="button" class="meta-notification-close" data-notification-close aria-label="Dismiss notification">&times;</button>
					</div>
					<div id="meta-notification-body" class="meta-notification-body"></div>
				</div>
			</div>
		</div>

		<footer class="user-response-panel">
			<span id="timer-announcement" class="visually-hidden" role="status"></span>
			<div id="user-response-hint" class="user-response-hint content-container"></div>
			<div id="user-response-panel" class="user-reponse-wrapper user-response-wrapper" role="group" aria-label="Your replies" tabindex="-1"></div>
		</footer>
	</div>

	<dialog id="menu-dialog" class="chat-dialog menu-dialog" aria-labelledby="menu-dialog-title">
		<div class="menu-dialog-header">
			<h2 id="menu-dialog-title" class="modal-title content-container">Menu</h2>
			<button type="button" class="photo-picker-close" data-menu-close aria-label="Close">&times;</button>
		</div>
		<div id="menu-container" class="content-container menu-section"></div>
		<div id="left-sidebar-container" class="content-container menu-section"></div>
		<div id="right-sidebar-container" class="content-container menu-section"></div>
	</dialog>

	<dialog id="photo-picker" class="chat-dialog photo-picker" aria-labelledby="photo-picker-title">
		<div class="photo-picker-header">
			<h2 id="photo-picker-title" class="modal-title">Send a photo</h2>
			<button type="button" class="photo-picker-close" data-picker-close aria-label="Close">&times;</button>
		</div>
		<div id="photo-picker-grid" class="photo-picker-grid"></div>
	</dialog>

	<dialog id="exit-dialog" class="chat-dialog" aria-labelledby="exit-dialog-title">
		<h2 id="exit-dialog-title" class="modal-title content-container">Restart the story?</h2>
		<div class="modal-body content-container">
			<p>This clears the conversation and starts again from the beginning.</p>
		</div>
		<div class="modal-footer content-container">
			<button type="button" class="dialog-btn" data-dialog-action="cancel">Cancel</button>
			<button type="button" class="dialog-btn dialog-btn--danger" data-dialog-action="restart">Restart</button>
		</div>
	</dialog>

	{{STORY_DATA}}

	<!--BUILD:SCRIPT-->
</body>
</html>
